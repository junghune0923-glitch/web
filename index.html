<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우울증 치료 클리닉 - 드래그 앤 노드 시스템</title>
    <style>
        :root {
            --bg-color: #121213;
            --text-color: #ececed;
            --accent-color: #4ade80; 
            --node-bg: #27272a;
            --border-color: #3f3f46;
            --line-inactive: #333;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        header {
            background: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            padding: 10px;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }
        nav { display: flex; gap: 10px; justify-content: center; }
        nav button {
            background: none; border: 1px solid var(--border-color);
            padding: 8px 16px; border-radius: 4px;
            color: #71717a; cursor: pointer; transition: 0.3s;
            font-size: 0.85rem;
        }
        nav button.active {
            background: var(--accent-color); color: #000; border-color: var(--accent-color);
        }

        .canvas-container {
            width: 100vw; height: 100vh;
            position: relative;
            background-image: radial-gradient(#2a2a2b 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .page { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: block; }

        /* 노드 스타일 */
        .node {
            position: absolute;
            background: var(--node-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 180px;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
        }
        .node-header {
            background: #3f3f46; padding: 6px 10px; font-size: 0.7rem;
            color: #d1d5db; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between;
            cursor: move; /* 이동 가능 표시 */
        }
        .node-body { 
            padding: 15px; text-align: center; font-size: 0.95rem; font-weight: 600; 
            cursor: pointer; /* 클릭 시 연결/해제 */
        }
        
        .node.connected { border-color: var(--accent-color); }
        .node.connected .node-header { background: var(--accent-color); color: #000; }

        /* SVG 연결선 */
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        path {
            fill: none; stroke: var(--line-inactive);
            stroke-width: 3; transition: stroke 0.3s;
        }
        path.active { stroke: var(--accent-color); stroke-dasharray: 8; animation: flow 1s linear infinite; }

        @keyframes flow { to { stroke-dashoffset: -16; } }

        .glass-card {
            background: #1e1e1f; border: 1px solid var(--border-color);
            padding: 2rem; border-radius: 12px; width: 400px;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        textarea {
            width: 100%; height: 150px; background: #121213; color: white;
            border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <nav id="mainNav">
        <button onclick="navTo('home')" class="active">Main</button>
        <button onclick="navTo('diag')">Diagnosis</button>
        <button onclick="navTo('routine')">Routine (Drag & Flow)</button>
        <button onclick="navTo('diary')">Anonymous Diary</button>
        <button onclick="navTo('kit')">Healing Kit</button>
    </nav>
</header>

<div class="canvas-container">
    <section id="home" class="page active">
        <div class="glass-card">
            <h2>우울증 치료 클리닉</h2>
            <p style="color:#a1a1aa;">치료 받지 않는 비율 84%[cite: 10].<br>당신의 루틴을 노드로 설계하세요.</p>
        </div>
    </section>

    <section id="diag" class="page">
        <div class="glass-card"><h3>자가진단</h3><p>감정 키워드를 선택하세요[cite: 18].</p></div>
    </section>

    <section id="routine" class="page">
        <svg id="svg-canvas">
            <path id="line1" d="" />
            <path id="line2" d="" />
            <path id="line3" d="" />
        </svg>

        <div class="node" id="node1" style="top:200px; left:100px;">
            <div class="node-header" onmousedown="startDrag(event, 'node1')"><span>START</span><span>⁝⁝</span></div>
            <div class="node-body" onclick="toggleConnect(1)">6시 기상 [cite: 39]</div>
        </div>

        <div class="node" id="node2" style="top:200px; left:400px;">
            <div class="node-header" onmousedown="startDrag(event, 'node2')"><span>FLOW</span><span>⁝⁝</span></div>
            <div class="node-body" onclick="toggleConnect(2)">출근 [cite: 40]</div>
        </div>

        <div class="node" id="node3" style="top:400px; left:700px;">
            <div class="node-header" onmousedown="startDrag(event, 'node3')"><span>FLOW</span><span>⁝⁝</span></div>
            <div class="node-body" onclick="toggleConnect(3)">퇴근 후 운동 [cite: 41]</div>
        </div>

        <div class="node" id="node4" style="top:200px; left:1000px;">
            <div class="node-header" onmousedown="startDrag(event, 'node4')"><span>END</span><span>⁝⁝</span></div>
            <div class="node-body" onclick="toggleConnect(4)">퇴근 [cite: 42]</div>
        </div>
    </section>

    <section id="diary" class="page">
        <div class="glass-card">
            <h3>익명 일기 공유 [cite: 35]</h3>
            <textarea placeholder="해방감과 유대감을 느껴보세요 [cite: 34, 36]"></textarea>
        </div>
    </section>

    <section id="kit" class="page">
        <div class="glass-card" style="text-align:center"><h3>힐링 키트 [cite: 33]</h3><div style="font-size:3rem">🎁</div></div>
    </section>
</div>

<script>
    let draggingNode = null;
    let offset = { x: 0, y: 0 };

    // 페이지 전환
    function navTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('#mainNav button').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(pageId === 'routine') updateAllLines();
    }

    // 드래그 시작
    function startDrag(e, id) {
        draggingNode = document.getElementById(id);
        const rect = draggingNode.getBoundingClientRect();
        offset.x = e.clientX - rect.left;
        offset.y = e.clientY - rect.top;
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);
    }

    function onDrag(e) {
        if (!draggingNode) return;
        draggingNode.style.left = (e.clientX - offset.x) + 'px';
        draggingNode.style.top = (e.clientY - offset.y) + 'px';
        updateAllLines();
    }

    function stopDrag() {
        draggingNode = null;
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', stopDrag);
    }

    // 노드 연결선 업데이트
    function updateAllLines() {
        drawCurve('node1', 'node2', 'line1');
        drawCurve('node2', 'node3', 'line2');
        drawCurve('node3', 'node4', 'line3');
    }

    function drawCurve(startId, endId, lineId) {
        const start = document.getElementById(startId).getBoundingClientRect();
        const end = document.getElementById(endId).getBoundingClientRect();
        const path = document.getElementById(lineId);

        const x1 = start.left + start.width;
        const y1 = start.top + start.height / 2;
        const x2 = end.left;
        const y2 = end.top + end.height / 2;

        const cp1x = x1 + (x2 - x1) / 2;
        const cp2x = x1 + (x2 - x1) / 2;

        path.setAttribute('d', `M ${x1} ${y1} C ${cp1x} ${y1}, ${cp2x} ${y2}, ${x2} ${y2}`);
    }

    function toggleConnect(index) {
        const node = document.getElementById('node' + index);
        node.classList.toggle('connected');
        const line = document.getElementById('line' + (index-1));
        if(line) line.classList.toggle('active');
    }

    // 초기 선 그리기
    window.onload = updateAllLines;
    window.onresize = updateAllLines;
</script>

</body>
</html>
